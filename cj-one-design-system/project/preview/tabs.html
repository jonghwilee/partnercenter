<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Tabs & Segmented</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans);}
  .group{margin-bottom:16px;}
  .lbl{font:500 12px/1 var(--font-mono);color:#676E82;margin-bottom:8px;}
  .tabs{display:flex;gap:24px;border-bottom:1px solid #D8DCE5;}
  .tab{padding:10px 0;font:700 15px/1.4 var(--font-sans);color:#9D9D9D;border-bottom:2px solid transparent;cursor:pointer;margin-bottom:-1px;}
  .tab.active{color:#000;border-color:#ED27CF;}
  .seg{display:inline-flex;background:#EDF0F5;padding:3px;border-radius:8px;}
  .seg button{height:32px;padding:0 14px;border:0;background:transparent;font:600 13px/1 var(--font-sans);color:#676E82;border-radius:6px;cursor:pointer;}
  .seg button.on{background:#fff;color:#000;box-shadow:0 1px 2px rgba(0,0,0,.06);}
</style></head>
<body>
<div class="group"><div class="lbl">tabs · underline</div>
<div class="tabs"><div class="tab active">개요</div><div class="tab">매출</div><div class="tab">정산</div><div class="tab">공지</div></div>
</div>
<div class="group"><div class="lbl">segmented control</div>
<div class="seg"><button class="on">일별</button><button>주별</button><button>월별</button></div>
</div>
</body></html>
