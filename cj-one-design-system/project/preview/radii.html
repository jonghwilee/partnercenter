<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans);}
  .grid{display:grid;grid-template-columns:repeat(9,1fr);gap:12px;text-align:center;}
  .box{height:80px;background:#FDE9FA;border:1px solid #ED27CF;}
  .lbl{font:500 12px/1.2 var(--font-mono);color:#676E82;margin-top:6px;}
</style></head>
<body>
  <div class="grid">
    <div><div class="box" style="border-radius:0"></div><div class="lbl">0</div></div>
    <div><div class="box" style="border-radius:4px"></div><div class="lbl">xs · 4</div></div>
    <div><div class="box" style="border-radius:6px"></div><div class="lbl">sm · 6</div></div>
    <div><div class="box" style="border-radius:8px"></div><div class="lbl">md · 8</div></div>
    <div><div class="box" style="border-radius:12px"></div><div class="lbl">lg · 12</div></div>
    <div><div class="box" style="border-radius:16px"></div><div class="lbl">xl · 16</div></div>
    <div><div class="box" style="border-radius:20px"></div><div class="lbl">2xl · 20</div></div>
    <div><div class="box" style="border-radius:28px"></div><div class="lbl">3xl · 28</div></div>
    <div><div class="box" style="border-radius:9999px"></div><div class="lbl">pill</div></div>
  </div>
</body></html>
