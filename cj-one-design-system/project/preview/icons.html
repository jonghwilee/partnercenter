<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Icons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans);}
  .grid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;}
  .ic{display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px;border:1px solid #EDF0F5;border-radius:8px;}
  .ic img{width:24px;height:24px;}
  .ic span{font:500 11px/1 var(--font-mono);color:#676E82;}
</style></head>
<body>
  <div class="grid">
    <div class="ic"><img src="../assets/icons/home.svg"><span>home</span></div>
    <div class="ic"><img src="../assets/icons/alram-on.svg"><span>alram-on</span></div>
    <div class="ic"><img src="../assets/icons/alram-off.svg"><span>alram-off</span></div>
    <div class="ic"><img src="../assets/icons/gift.svg"><span>gift</span></div>
    <div class="ic"><img src="../assets/icons/best.svg"><span>best</span></div>
    <div class="ic"><img src="../assets/icons/best2.svg"><span>best2</span></div>
    <div class="ic"><img src="../assets/icons/benefit.svg"><span>benefit</span></div>
    <div class="ic"><img src="../assets/icons/like.svg"><span>like</span></div>
    <div class="ic"><img src="../assets/icons/barcode.svg"><span>barcode</span></div>
  </div>
</body></html>
