<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Buttons — Sizes</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans);}
  .row{display:flex;gap:10px;align-items:center;margin-bottom:10px;}
  .lbl{width:90px;font:500 12px/1 var(--font-mono);color:#676E82;}
  .b{background:#ED27CF;color:#fff;border:0;border-radius:8px;font-weight:700;cursor:pointer;}
  .xl{height:56px;padding:0 20px;font-size:16px;}
  .l{height:48px;padding:0 16px;font-size:15px;}
  .m{height:40px;padding:0 12px;font-size:15px;}
  .s{height:32px;padding:0 10px;font-size:13px;border-radius:6px;}
  .xs{height:24px;padding:0 8px;font-size:12px;border-radius:6px;}
</style></head>
<body>
  <div class="row"><span class="lbl">xlarge · 56</span><button class="b xl">확인</button></div>
  <div class="row"><span class="lbl">large · 48</span><button class="b l">확인</button></div>
  <div class="row"><span class="lbl">medium · 40</span><button class="b m">확인</button></div>
  <div class="row"><span class="lbl">small · 32</span><button class="b s">확인</button></div>
  <div class="row"><span class="lbl">xsmall · 24</span><button class="b xs">확인</button></div>
</body></html>
