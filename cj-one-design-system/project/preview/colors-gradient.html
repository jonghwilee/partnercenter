<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Brand Gradient</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans);display:flex;flex-direction:column;gap:12px;}
  .g{height:120px;border-radius:20px;display:flex;align-items:flex-end;padding:16px;color:#fff;font-weight:700;font-size:16px;}
  .stops{display:flex;gap:8px;font:500 11px/1 var(--font-mono);color:#676E82;}
  .stop{display:flex;align-items:center;gap:6px;} .stop b{width:14px;height:14px;border-radius:4px;}
</style></head>
<body>
  <div class="g" style="background:linear-gradient(135deg,#617CFF 0%,#8652FF 20%,#ED27CF 100%);">cj-one ⋅ light</div>
  <div class="g" style="background:linear-gradient(135deg,#ED27CF 0%,#8652FF 40%,#617CFF 100%);">cj-one ⋅ dark</div>
  <div class="stops">
    <span class="stop"><b style="background:#617CFF"></b>#617CFF</span>
    <span class="stop"><b style="background:#8652FF"></b>#8652FF</span>
    <span class="stop"><b style="background:#ED27CF"></b>#ED27CF</span>
  </div>
</body></html>
