<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans);}
  .row{display:flex;align-items:center;gap:14px;padding:4px 0;}
  .bar{height:14px;background:#ED27CF;border-radius:2px;}
  .lbl{width:80px;font:500 12px/1 var(--font-mono);color:#676E82;}
  .val{margin-left:auto;color:#9D9D9D;font:400 11px/1 var(--font-mono);}
</style></head>
<body>
  <div class="row"><span class="lbl">space-1</span><span class="bar" style="width:4px"></span><span class="val">4px</span></div>
  <div class="row"><span class="lbl">space-2</span><span class="bar" style="width:8px"></span><span class="val">8px</span></div>
  <div class="row"><span class="lbl">space-3</span><span class="bar" style="width:12px"></span><span class="val">12px</span></div>
  <div class="row"><span class="lbl">space-4</span><span class="bar" style="width:16px"></span><span class="val">16px</span></div>
  <div class="row"><span class="lbl">space-5</span><span class="bar" style="width:20px"></span><span class="val">20px</span></div>
  <div class="row"><span class="lbl">space-6</span><span class="bar" style="width:24px"></span><span class="val">24px</span></div>
  <div class="row"><span class="lbl">space-8</span><span class="bar" style="width:32px"></span><span class="val">32px</span></div>
  <div class="row"><span class="lbl">space-10</span><span class="bar" style="width:40px"></span><span class="val">40px</span></div>
  <div class="row"><span class="lbl">space-12</span><span class="bar" style="width:48px"></span><span class="val">48px</span></div>
  <div class="row"><span class="lbl">space-16</span><span class="bar" style="width:64px"></span><span class="val">64px</span></div>
</body></html>
