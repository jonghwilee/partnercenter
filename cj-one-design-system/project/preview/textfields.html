<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>TextFields</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans);}
  .stack{display:flex;flex-direction:column;gap:12px;max-width:420px;}
  .field{display:flex;flex-direction:column;gap:6px;}
  .field label{font:500 13px/1 var(--font-sans);color:#434343;}
  .input{height:40px;border:1px solid #D8DCE5;border-radius:8px;padding:0 12px;font:400 15px/1 var(--font-sans);color:#262626;background:#fff;outline:none;}
  .input::placeholder{color:#9D9D9D;}
  .input:focus{border-color:#ED27CF;border-width:2px;padding:0 11px;}
  .input.err{border-color:#FF0037;}
  .input.dis{background:#EDF0F5;color:#9D9D9D;}
  .help{font:400 12px/1 var(--font-sans);color:#676E82;}
  .help.err{color:#FF0037;}
</style></head>
<body>
<div class="stack">
  <div class="field"><label>아이디</label><input class="input" placeholder="아이디를 입력하세요"></div>
  <div class="field"><label>비밀번호 · focused</label><input class="input" value="••••••" style="border-color:#ED27CF;border-width:2px;padding:0 11px;"></div>
  <div class="field"><label>오류</label><input class="input err" value="user@cjone..kr"><span class="help err">이메일 형식이 올바르지 않습니다.</span></div>
  <div class="field"><label>비활성화</label><input class="input dis" value="readonly@cj.net" disabled></div>
</div>
</body></html>
