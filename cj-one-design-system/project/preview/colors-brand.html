<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Colors — Brand</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff;}
  .grid{display:grid;grid-template-columns:repeat(9,1fr);gap:8px;}
  .sw{aspect-ratio:1/1;border-radius:8px;display:flex;align-items:flex-end;padding:8px;border:1px solid rgba(28,28,67,.06);font:500 11px/1.2 var(--font-sans);color:#fff;}
  .sw small{display:block;opacity:.8;font-weight:400;margin-top:2px;}
  .sw.dark{color:#fff;} .sw.light{color:#000;}
</style></head>
<body>
  <div class="grid">
    <div class="sw light" style="background:#FDE9FA">pink-50<small>FDE9FA</small></div>
    <div class="sw light" style="background:#F9B4EE">pink-100<small>F9B4EE</small></div>
    <div class="sw light" style="background:#F47DDF">pink-200<small>F47DDF</small></div>
    <div class="sw" style="background:#F156D9">pink-300<small>F156D9</small></div>
    <div class="sw" style="background:#ED27CF">pink-400<small>ED27CF ★</small></div>
    <div class="sw" style="background:#C71BAF">pink-500<small>C71BAF</small></div>
    <div class="sw" style="background:#99178A">pink-600<small>99178A</small></div>
    <div class="sw" style="background:#66115E">pink-700<small>66115E</small></div>
    <div class="sw" style="background:#33042D">pink-800<small>33042D</small></div>
  </div>
</body></html>
