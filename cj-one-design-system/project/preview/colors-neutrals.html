<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Colors — Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff;}
  .grid{display:grid;grid-template-columns:repeat(9,1fr);gap:8px;}
  .sw{aspect-ratio:1/1;border-radius:8px;display:flex;align-items:flex-end;padding:8px;border:1px solid rgba(28,28,67,.06);font:500 11px/1.2 var(--font-sans);}
  .sw small{display:block;opacity:.8;font-weight:400;margin-top:2px;}
</style></head>
<body>
  <div class="grid">
    <div class="sw" style="background:#FFFFFF;color:#000">white<small>FFFFFF</small></div>
    <div class="sw" style="background:#F5F6FA;color:#000">gray-50<small>F5F6FA</small></div>
    <div class="sw" style="background:#EDF0F5;color:#000">gray-100<small>EDF0F5</small></div>
    <div class="sw" style="background:#D8DCE5;color:#000">gray-200<small>D8DCE5</small></div>
    <div class="sw" style="background:#BFC5D2;color:#000">gray-300<small>BFC5D2</small></div>
    <div class="sw" style="background:#9D9D9D;color:#fff">gray-400<small>9D9D9D</small></div>
    <div class="sw" style="background:#676E82;color:#fff">gray-600<small>676E82</small></div>
    <div class="sw" style="background:#434343;color:#fff">gray-700<small>434343</small></div>
    <div class="sw" style="background:#1E192A;color:#fff">navy-900<small>1E192A ★</small></div>
  </div>
</body></html>
